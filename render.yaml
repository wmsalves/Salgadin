services:
  - type: web
    name: salgadin-api
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: PORT
        value: 10000
      - key: SUPABASE_DB_CONNECTION
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        sync: false
      - key: Jwt__Audience
        sync: false
      - key: Authentication__Google__ClientId
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: INTERNAL_HEALTH_TOKEN
        sync: false
      - key: Database__ApplyMigrationsOnStartup
        sync: false
